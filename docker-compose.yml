version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: app-template-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_template
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  prisma-studio:
    image: node:22-alpine
    container_name: app-template-prisma-studio
    working_dir: /app
    command: npx --yes prisma@7 studio --browser none --port 5555 --url postgresql://postgres:postgres@postgres:5432/app_template
    ports:
      - '5555:5555'
    volumes:
      - ./apps/web/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres-data:
    driver: local

networks:
  app-network:
    driver: bridge
